name: controle-excursao

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: controle_excursao
      POSTGRES_USER: controle_excursao
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U controle_excursao']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://controle_excursao:${POSTGRES_PASSWORD}@postgres:5432/controle_excursao
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      CORS_ORIGIN: https://gestaoexcursao.victorandra.de
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      TZ: America/Sao_Paulo
    networks:
      - default
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.controle-excursao.rule=Host(`gestaoexcursao.victorandra.de`)"
      - "traefik.http.routers.controle-excursao.entrypoints=websecure"
      - "traefik.http.routers.controle-excursao.tls.certresolver=letsencrypt"
      - "traefik.http.services.controle-excursao.loadbalancer.server.port=80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  traefik-proxy:
    external: true

volumes:
  postgres_data:
