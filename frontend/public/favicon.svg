<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Fundo azul arredondado -->
  <rect width="64" height="64" rx="14" fill="url(#g)"/>

  <!-- Carnê: metade superior -->
  <rect x="9" y="9" width="46" height="20" rx="4" fill="white"/>

  <!-- Carnê: metade inferior -->
  <rect x="9" y="35" width="46" height="20" rx="4" fill="white"/>

  <!-- Linha de picote -->
  <line x1="13" y1="32" x2="51" y2="32"
        stroke="white" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Estrela dourada (prêmio) na metade superior -->
  <path d="M32 12 L33.9 17 L39 17.2 L35 20.5 L36.4 25.6
           L32 22.7 L27.6 25.6 L29 20.5 L25 17.2 L30.1 17 Z"
        fill="#f59e0b"/>

  <!-- Três círculos (números do carnê) na metade inferior -->
  <circle cx="21" cy="45" r="3.5" fill="#3b82f6"/>
  <circle cx="32" cy="45" r="3.5" fill="#3b82f6"/>
  <circle cx="43" cy="45" r="3.5" fill="#3b82f6"/>
</svg>
